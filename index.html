<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Tactics Board Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- チーム選択画面 -->
    <div id="select-screen" class="screen" style="width: 100%; max-width: 500px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">Tactics Board Pro</h2>
        </div>
        
        <div class="form-group" style="margin-bottom: 15px;">
            <select id="select-team-sort" onchange="changeTeamSortMethod()" style="padding: 10px; font-size: 14px; background: #1e1e24; width: 100%; color: white; border: 1px solid #444; border-radius: 6px;">
                <option value="default">並び替え: 登録順</option>
                <option value="name">並び替え: チーム名順 (五十音/ABC順)</option>
                <option value="custom">並び替え: 自由に変更 (手動)</option>
            </select>
        </div>

        <div class="team-grid" id="team-grid"></div>
        <button style="width: 100%;" onclick="showCreateTeamModal()">＋ 新しいチームを作成</button>
    </div>

    <!-- メイン編集画面 -->
    <div id="edit-screen" class="screen">
        <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 450px; margin: 0 auto 15px auto;">
            <button class="btn-secondary" onclick="backToSelectScreen()">◀ 戻る</button>
            <div id="autosave-indicator">✓ Auto Saved</div>
        </div>

        <div class="workspace">
            <div id="board-container">
                <div id="display-team-name"></div>
                <div id="pitch-wrapper">
                    <canvas id="pitchCanvas" width="450" height="600"></canvas>
                    <div id="players-on-pitch"></div>
                </div>
                <div id="display-manager-name"></div>
            </div>

            <div class="sidebar">
                <h3>チーム設定</h3>
                <div class="form-group">
                    <label>チーム名</label>
                    <input type="text" id="input-team-name" oninput="updateTeamMeta()">
                </div>
                <div class="form-group">
                    <label>監督名</label>
                    <input type="text" id="input-manager-name" oninput="updateTeamMeta()">
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 90px;">
                        <label>ユニフォーム(FP)</label>
                        <div class="color-picker-container">
                            <div class="color-picker-wrapper" id="fp-color-preview">
                                <input type="color" id="input-uniform-color" class="custom-color-input" value="#e53935" onchange="updateUniformColor()">
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 90px;">
                        <label>ユニフォーム(GK)</label>
                        <div class="color-picker-container">
                            <div class="color-picker-wrapper" id="gk-color-preview">
                                <input type="color" id="input-gk-uniform-color" class="custom-color-input" value="#ffb300" onchange="updateUniformColor()">
                            </div>
                        </div>
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 90px;">
                        <label>背番号(FP)</label>
                        <div class="color-picker-container">
                            <div class="color-picker-wrapper" id="fp-number-color-preview" style="background-color: #ffffff;">
                                <input type="color" id="input-fp-number-color" class="custom-color-input" value="#ffffff" onchange="updateUniformColor()">
                            </div>
                        </div>
                    </div>
                </div>

                <hr style="border: 0.5px solid #444; margin: 20px 0;">

                <h3>選手登録 (<span id="player-count">0</span>/100)</h3>
                <div id="player-form">
                    <div class="form-group-row">
                        <input type="checkbox" id="p-is-gk" style="width:20px; height:20px;">
                        <label for="p-is-gk" style="font-size: 14px; color: #fff; cursor: pointer;">GK</label>
                    </div>
                    <div class="form-group">
                        <label>氏名</label>
                        <input type="text" id="p-name" placeholder="name">
                    </div>
                    <div class="form-group">
                        <label>背番号</label>
                        <input type="number" id="p-number" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label>顔写真</label>
                        <input type="file" id="p-photo" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>メモ1</label>
                        <input type="text" id="p-memo1" placeholder="memo">
                    </div>
                    <div class="form-group">
                        <label>メモ2</label>
                        <textarea id="p-memo2" rows="2" placeholder=""></textarea>
                    </div>
                    <button type="button" style="width:100%" id="btn-submit-player" onclick="registerPlayer()">選手を追加・更新</button>
                    <button type="button" style="width:100%; margin-top:5px; display:none;" id="btn-cancel-edit" class="btn-secondary" onclick="clearPlayerForm()">編集をキャンセル</button>
                </div>

                <div style="margin-top: 30px; border-bottom: 1px solid #444; padding-bottom: 8px;">
                    <h4 style="margin: 0 0 8px 0;">登録選手一覧</h4>
                    <div class="form-group" style="margin-bottom: 0;">
                        <select id="select-player-sort" onchange="changeSortMethod()" style="padding: 6px 10px; font-size: 12px; background: #2a2a32; width: 100%;">
                            <option value="default">並び替え: 登録順</option>
                            <option value="number">並び替え: 背番号順 (昇順)</option>
                            <option value="name">並び替え: 名前順 (ABC/五十音)</option>
                            <option value="gk">並び替え: GK優先</option>
                        </select>
                    </div>
                </div>
                <div id="registered-players-list"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
